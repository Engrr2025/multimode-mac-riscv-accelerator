<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 770" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dd6b20"/>
    </marker>
    <style>
      .title { font-size: 23px; font-weight: 700; fill: #1a202c; }
      .sub   { font-size: 13px; fill: #4a5568; }
      .blk   { font-size: 14px; font-weight: 600; fill: #1a202c; }
      .small { font-size: 11px; fill: #4a5568; }
      .addr  { font-size: 10.5px; fill: #718096; font-family: monospace; }
      .lane  { stroke: #4a5568; stroke-width: 2; fill: none; }
      .port  { font-size: 11px; font-weight: 600; fill: #2d3748; }
      .dom   { font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <text x="40" y="40" class="title">RISC-V SoC with Multi-Mode MAC Accelerator</text>
  <text x="40" y="63" class="sub">SweRV EH1 core on an AXI4-Full interconnect, with a Wishbone peripheral subsystem bridged off it. Artix-7 (Nexys A7-100T).</text>

  <!-- ===== AXI DOMAIN label ===== -->
  <text x="40" y="98" class="dom" fill="#3b6fb6">AXI4-Full domain</text>

  <!-- SweRV core -->
  <rect x="40" y="110" width="195" height="140" rx="10" fill="#ebf2fb" stroke="#3b6fb6" stroke-width="2"/>
  <text x="137" y="138" text-anchor="middle" class="blk">SweRV EH1 Core</text>
  <text x="137" y="156" text-anchor="middle" class="small">32-bit, in-order, RV32IMC</text>
  <rect x="60" y="172" width="72" height="60" rx="6" fill="#ffffff" stroke="#3b6fb6" stroke-width="1.5"/>
  <text x="96" y="198" text-anchor="middle" class="small">IFU</text>
  <text x="96" y="215" text-anchor="middle" class="small">fetch</text>
  <rect x="143" y="172" width="72" height="60" rx="6" fill="#ffffff" stroke="#3b6fb6" stroke-width="1.5"/>
  <text x="179" y="198" text-anchor="middle" class="small">LSU</text>
  <text x="179" y="215" text-anchor="middle" class="small">load/store</text>

  <!-- JTAG -->
  <rect x="40" y="285" width="195" height="62" rx="10" fill="#f7fafc" stroke="#718096" stroke-width="1.5"/>
  <text x="137" y="311" text-anchor="middle" class="blk">JTAG / DMI Debug</text>
  <text x="137" y="330" text-anchor="middle" class="small">bscan_tap, ILA bring-up</text>
  <path class="lane" d="M137 285 V250" marker-end="url(#arrow)"/>

  <!-- AXI interconnect -->
  <rect x="320" y="110" width="120" height="270" rx="10" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <text x="380" y="232" text-anchor="middle" class="blk" fill="#ffffff">AXI4-Full</text>
  <text x="380" y="252" text-anchor="middle" class="blk" fill="#ffffff">Interconnect</text>
  <text x="380" y="360" text-anchor="middle" class="small" fill="#a0aec0">crossbar</text>
  <path class="lane" d="M235 190 H320" marker-end="url(#arrow)"/>
  <text x="277" y="181" text-anchor="middle" class="port">AXI4</text>

  <!-- AXI slaves -->
  <!-- DDR2 -->
  <rect x="540" y="110" width="245" height="62" rx="10" fill="#ebf2fb" stroke="#3b6fb6" stroke-width="2"/>
  <text x="662" y="136" text-anchor="middle" class="blk">DDR2 Memory</text>
  <text x="662" y="155" text-anchor="middle" class="small">LiteDRAM controller</text>

  <!-- MAC -->
  <rect x="540" y="186" width="245" height="78" rx="10" fill="#fff4e6" stroke="#dd6b20" stroke-width="3"/>
  <text x="662" y="212" text-anchor="middle" class="blk" fill="#9c4221">Multi-Mode MAC Accelerator</text>
  <text x="662" y="230" text-anchor="middle" class="small">mac_axi4_top (AXI4-Full slave)</text>
  <text x="662" y="250" text-anchor="middle" class="addr">0x8000_4000 - 0x8000_4FFF  ·  this project</text>

  <!-- AXI to WB bridge -->
  <rect x="540" y="278" width="245" height="62" rx="10" fill="#faf5ff" stroke="#6b46c1" stroke-width="2"/>
  <text x="662" y="304" text-anchor="middle" class="blk" fill="#553c9a">AXI-to-Wishbone Bridge</text>
  <text x="662" y="323" text-anchor="middle" class="small">connects the peripheral bus</text>

  <path class="lane" d="M440 141 H540" marker-end="url(#arrow)"/>
  <path class="lane" d="M440 225 H540" stroke="#dd6b20" stroke-width="2.5" marker-end="url(#arrowO)"/>
  <path class="lane" d="M440 309 H540" marker-end="url(#arrow)"/>

  <!-- ===== WISHBONE DOMAIN ===== -->
  <text x="40" y="438" class="dom" fill="#2c7a7b">Wishbone peripheral domain</text>

  <!-- bridge down to WB bus -->
  <path class="lane" d="M662 340 V470" stroke="#2c7a7b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- WB bus bar -->
  <rect x="60" y="470" width="920" height="40" rx="8" fill="#234e52" stroke="#1a202c" stroke-width="2"/>
  <text x="520" y="495" text-anchor="middle" class="blk" fill="#ffffff">Wishbone Bus</text>

  <!-- WB peripherals -->
  <g>
    <rect x="70" y="560" width="160" height="78" rx="10" fill="#e6fffa" stroke="#2c7a7b" stroke-width="2"/>
    <text x="150" y="592" text-anchor="middle" class="blk">Boot ROM</text>
    <text x="150" y="612" text-anchor="middle" class="small">reset boot code</text>

    <rect x="250" y="560" width="160" height="78" rx="10" fill="#e6fffa" stroke="#2c7a7b" stroke-width="2"/>
    <text x="330" y="592" text-anchor="middle" class="blk">UART</text>
    <text x="330" y="612" text-anchor="middle" class="small">console / status</text>

    <rect x="430" y="560" width="160" height="78" rx="10" fill="#e6fffa" stroke="#2c7a7b" stroke-width="2"/>
    <text x="510" y="592" text-anchor="middle" class="blk">GPIO</text>
    <text x="510" y="612" text-anchor="middle" class="small">LEDs / switches</text>

    <rect x="610" y="560" width="160" height="78" rx="10" fill="#e6fffa" stroke="#2c7a7b" stroke-width="2"/>
    <text x="690" y="592" text-anchor="middle" class="blk">SPI Flash</text>
    <text x="690" y="612" text-anchor="middle" class="small">configuration flash</text>

    <rect x="790" y="560" width="160" height="78" rx="10" fill="#e6fffa" stroke="#2c7a7b" stroke-width="2"/>
    <text x="870" y="592" text-anchor="middle" class="blk">System Ctrl</text>
    <text x="870" y="612" text-anchor="middle" class="small">timer / GPIO regs</text>
  </g>

  <path class="lane" d="M150 510 V560" stroke="#2c7a7b" marker-end="url(#arrow)"/>
  <path class="lane" d="M330 510 V560" stroke="#2c7a7b" marker-end="url(#arrow)"/>
  <path class="lane" d="M510 510 V560" stroke="#2c7a7b" marker-end="url(#arrow)"/>
  <path class="lane" d="M690 510 V560" stroke="#2c7a7b" marker-end="url(#arrow)"/>
  <path class="lane" d="M870 510 V560" stroke="#2c7a7b" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="40" y="690" class="small">High-throughput paths (core, DDR2, MAC) sit on AXI4-Full. Slower peripherals sit on Wishbone, reached through the bridge.</text>
  <text x="40" y="710" class="small">Clocks: 50 MHz core, higher-frequency bus via PLL, separate JTAG debug domain. The crossbar was extended to add the MAC region.</text>
</svg>
